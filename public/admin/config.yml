backend:
  name: git-gateway
  branch: main

site_url: https://abhilaksh.netlify.app
display_url: https://abhilaksh.netlify.app

local_backend: true
publish_mode: editorial_workflow

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: public/posts
    extension: md
    format: frontmatter
    create: true
    slug: '{{slug}}'
    preview_path: /article/{{slug}}
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Publish Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD }
      - { label: Category, name: category, widget: string, default: Notes }
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Read Time, name: readTime, widget: string, default: 5 min read }
      -
          label: Card Gradient
          name: gradientClass
          widget: select
          default: bg-gradient-to-br from-[#0a0a1a] to-[#00001c]
          options:
            - bg-gradient-to-br from-[#0a0a1a] to-[#00001c]
            - bg-gradient-to-tl from-[#0a0a1a] to-[#00001c]
            - bg-gradient-to-b from-[#0a0a1a] to-[#00001c]
      - { label: Cover Image, name: coverImage, widget: image, required: false }
      - { label: Published, name: published, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown }